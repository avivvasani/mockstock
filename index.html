<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MockStock</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom styles for the dark mode toggle and general layout */
    body.dark {
      background-color: #1a202c;
      color: #e2e8f0;
    }
    .dark .topbar {
      background-color: #2d3748;
    }
    .dark .auth-row input, .dark .auth-row button {
      background-color: #4a5568;
      color: #e2e8f0;
      border-color: #2d3748;
    }
    .dark .btn-primary {
      background-color: #4299e1;
    }
    .dark .btn-accent {
      background-color: #f6ad55;
    }
    .dark .pill {
      background-color: #2d3748;
    }
    .dark .card {
      background-color: #2d3748;
      border-color: #4a5568;
    }
    .good {
      color: #48bb78; /* Green */
    }
    .bad {
      color: #ef4444; /* Red */
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex flex-col font-sans">
  <header class="topbar bg-white shadow-md p-4 flex justify-between items-center rounded-b-lg">
    <div class="brand text-2xl font-bold text-indigo-700">MockStock</div>
    <div class="auth space-y-2 md:space-y-0 md:flex md:space-x-4">
      <div id="auth-when-logged-out" class="auth-row flex flex-col md:flex-row items-center gap-2">
        <input id="email" type="email" placeholder="email" class="p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <input id="password" type="password" placeholder="password" class="p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <button id="btn-signup" class="btn bg-indigo-500 text-white px-4 py-2 rounded-md hover:bg-indigo-600 transition-colors">Sign up</button>
        <button id="btn-login" class="btn bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600 transition-colors">Log in</button>
        <button id="btn-guest" class="btn bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 transition-colors">Guest</button>
        <button id="btn-google" class="btn bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600 transition-colors">Google</button>
      </div>
      <div id="auth-when-logged-in" class="auth-row hidden flex items-center gap-4">
        <span id="whoami" class="text-lg font-medium"></span>
        <button id="btn-logout" class="btn bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600 transition-colors">Log out</button>
        <button id="theme" class="btn bg-gray-700 text-white px-4 py-2 rounded-md hover:bg-gray-800 transition-colors">Toggle Theme</button>
      </div>
      <span id="authMsg" class="text-sm text-red-500 ml-4"></span>
    </div>
  </header>

  <main class="container mx-auto p-4 flex-grow grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- User Portfolio Summary -->
    <section id="summary" class="bg-white p-6 rounded-lg shadow-md col-span-1 hidden">
      <h2 class="text-xl font-semibold mb-4">Your Portfolio</h2>
      <div class="space-y-2">
        <div class="flex justify-between">
          <span>Cash:</span> <span id="cash" class="font-medium"></span>
        </div>
        <div class="flex justify-between">
          <span>Invested Value:</span> <span id="invested" class="font-medium"></span>
        </div>
        <div class="flex justify-between">
          <span>Current Value:</span> <span id="currentValue" class="font-medium"></span>
        </div>
        <div class="flex justify-between text-lg font-bold">
          <span>Profit/Loss:</span> <span id="pl" class="font-bold"></span>
        </div>
        <h3 class="text-lg font-semibold mt-4">Your Holdings</h3>
        <div id="holdingsList" class="space-y-1 text-sm">
          <!-- Holdings will be rendered here -->
        </div>
      </div>
    </section>

    <!-- Market Controls and Stocks Grid -->
    <section id="market-section" class="col-span-1 md:col-span-2 space-y-6">
      <div class="controls bg-white p-6 rounded-lg shadow-md flex flex-wrap gap-4 items-center">
        <label class="flex flex-col">
          <span class="text-sm text-gray-600">Category</span>
          <select id="categoryFilter" class="p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500"></select>
        </label>
        <input id="search" type="text" placeholder="Search by name or symbol" class="p-2 border border-gray-300 rounded-md flex-grow focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        <!-- Admin-only -->
        <button id="btn-tick" class="btn bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600 transition-colors hidden" title="Admins: push a new price tick for everyone">
          Tick Market Now
        </button>
      </div>

      <div id="marketMeta" class="meta text-sm text-gray-500 text-center mb-4"></div>

      <div id="market" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        <!-- Market cards will be rendered here -->
      </div>
    </section>

    <!-- Admin Panel (Initially Hidden) -->
    <section id="admin-panel" class="col-span-full bg-white p-6 rounded-lg shadow-md hidden">
      <h2 class="text-2xl font-bold mb-6 text-indigo-700">Admin Dashboard</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- User Management -->
        <div class="bg-gray-50 p-6 rounded-lg shadow-inner">
          <h3 class="text-xl font-semibold mb-4">User Management</h3>
          <div class="space-y-4">
            <div>
              <label for="admin-user-email" class="block text-sm font-medium text-gray-700 mb-1">User Email:</label>
              <input type="email" id="admin-user-email" placeholder="user@example.com" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div>
              <label for="admin-user-password" class="block text-sm font-medium text-gray-700 mb-1">New Password (for change/create):</label>
              <input type="password" id="admin-user-password" placeholder="password" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>
            <div class="flex flex-col sm:flex-row gap-2">
              <button id="admin-create-user" class="btn bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 transition-colors flex-grow">Create User</button>
              <button id="admin-change-password" class="btn bg-yellow-600 text-white px-4 py-2 rounded-md hover:bg-yellow-700 transition-colors flex-grow">Change Password</button>
              <button id="admin-delete-user" class="btn bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700 transition-colors flex-grow">Delete User</button>
            </div>
            <p id="admin-user-msg" class="text-sm text-center mt-2"></p>
          </div>
        </div>

        <!-- Analytics View -->
        <div class="bg-gray-50 p-6 rounded-lg shadow-inner md:col-span-1 lg:col-span-2">
          <h3 class="text-xl font-semibold mb-4">System Analytics</h3>
          <button id="admin-view-analytics" class="btn bg-purple-600 text-white px-4 py-2 rounded-md hover:bg-purple-700 transition-colors mb-4">View All Users' Data</button>
          <div id="analytics-output" class="bg-white p-4 rounded-md border border-gray-200 text-sm max-h-96 overflow-y-auto">
            <p class="text-gray-500">Click "View All Users' Data" to fetch and display analytics.</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="foot bg-gray-200 text-gray-600 text-center p-4 text-sm mt-6 rounded-t-lg">
    © MockStock — demo only. Developed with Firebase.
  </footer>

  <!-- Trade Modal -->
  <dialog id="trade" class="modal bg-white p-6 rounded-lg shadow-lg backdrop:bg-black backdrop:opacity-50">
    <h3 id="tradeTitle" class="text-xl font-semibold mb-2"></h3>
    <p id="tradePrice" class="text-lg text-gray-700 mb-4"></p>
    <div class="mb-4">
      <label for="qty" class="block text-sm font-medium text-gray-700 mb-1">Quantity:</label>
      <input type="number" id="qty" value="1" min="1" class="w-full p-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div class="flex gap-4">
      <button id="buy" class="btn bg-green-500 text-white px-4 py-2 rounded-md hover:bg-green-600 transition-colors flex-grow">Buy</button>
      <button id="sell" class="btn bg-red-500 text-white px-4 py-2 rounded-md hover:bg-red-600 transition-colors flex-grow">Sell</button>
      <button id="cancel" class="btn bg-gray-500 text-white px-4 py-2 rounded-md hover:bg-gray-600 transition-colors flex-grow">Cancel</button>
    </div>
    <p id="tradeMsg" class="text-sm text-center mt-4"></p>
  </dialog>

  <!-- App JavaScript -->
  <script type="module" src="app.js"></script>
</body>
</html>
