<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MockStock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">MockStock</div>
    <div class="auth">
      <div id="auth-when-logged-out" class="auth-row">
        <input id="email" type="email" placeholder="email" />
        <input id="password" type="password" placeholder="password" />
        <button id="btn-signup">Sign up</button>
        <button id="btn-login">Log in</button>
        <button id="btn-google">Google</button>
      </div>
      <div id="auth-when-logged-in" class="auth-row hidden">
        <span id="whoami"></span>
        <button id="btn-logout">Log out</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <label>
        Category
        <select id="categoryFilter"></select>
      </label>

      <input id="search" type="text" placeholder="Search by name or symbol" />

      <!-- Admin-only -->
      <button id="btn-tick" class="primary hidden" title="Admins: push a new price tick for everyone">
        Tick Market Now
      </button>
    </section>

    <section id="marketMeta" class="meta muted"></section>

    <section id="stocksGrid" class="grid"></section>
  </main>

  <footer class="foot muted">© MockStock — demo only</footer>

  <!-- App -->
  <script type="module" src="script.js"></script>
</body>
</html>
