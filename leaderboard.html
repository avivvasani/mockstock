<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashoka Mock-Stock | Leaderboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://*:5000 http://127.0.0.1:5000 http://localhost:5000;">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
            if (!localStorage.getItem('theme')) {
                localStorage.setItem('theme', 'light');
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>

    <style>
        :root {
            --primary-blue: #004275; 
            --dark-blue: #3b82f6; 
            --golden-yellow: #FFD700; 
            --silver: #C0C0C0;
            --bronze: #CD7F32;
            --light-background: #F8F8F0; 
            --font-family: 'Poppins', sans-serif;
        }
        body { font-family: var(--font-family); }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
        }
        .dark .glass-card {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }
        .podium-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        @media (min-width: 768px) {
            .podium-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            }
        }
        .rank-badge {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: bold;
            color: white;
        }
        .gold { background: linear-gradient(45deg, #FFD700, #FFA500); box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
        .silver { background: linear-gradient(45deg, #C0C0C0, #A9A9A9); }
        .bronze { background: linear-gradient(45deg, #CD7F32, #8B4513); }
        .standard-rank { background: #e6edf2; color: var(--primary-blue); }
        .dark .standard-rank { background: #262626; color: #a3a3a3; }

        .price-chip {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
            display: inline-block;
            white-space: nowrap;
        }
        .profit-chip { background-color: #d1fae5; color: #065f46; }
        .loss-chip { background-color: #fee2e2; color: #991b1b; }
        .dark .profit-chip { background-color: #064e3b; color: #34d399; }
        .dark .loss-chip { background-color: #7f1d1d; color: #f87171; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .live-indicator {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body class="min-h-screen p-4 sm:p-8 bg-[#F8F8F0] dark:bg-zinc-800 text-gray-800 dark:text-gray-100 transition-colors duration-200">

    <div class="max-w-md md:max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-2">
            <span id="notif-status" class="text-xs font-semibold px-2 py-1 rounded bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-400">
                🔔 Notifications: Requesting Permission...
            </span>
            <button id="theme-toggle" class="px-3 py-1.5 rounded-xl bg-white/80 dark:bg-black text-xs font-semibold shadow-sm border border-gray-200 dark:border-zinc-700 text-gray-800 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-zinc-900 transition-colors focus:outline-none">
                🌓 Toggle Theme
            </button>
        </div>

        <header class="mb-6 md:mb-12 text-center">
            <div class="inline-block px-3 py-1 mb-3 rounded-full bg-slate-100 dark:bg-zinc-900 text-slate-700 dark:text-zinc-300 text-xs font-semibold tracking-wider uppercase">
                <span class="live-indicator"></span> Live Market Session
            </div>
            <h1 class="text-2xl sm:text-4xl md:text-5xl font-extrabold mb-1 tracking-tight text-[#004275] dark:text-blue-400">
                Traders' Hall of Fortune
            </h1>
            <p class="text-xs sm:text-sm text-gray-500 dark:text-zinc-400 font-medium italic">"Fortune favors the bold."</p>
        </header>

        <div id="podium-area" class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-6 md:mb-12"></div>

        <div class="glass-card rounded-2xl overflow-hidden shadow-sm">
            <div class="p-4 md:p-6 border-b border-gray-100 dark:border-zinc-800 flex justify-between items-center bg-white/50 dark:bg-black/50">
                <h2 class="text-base sm:text-lg md:text-xl font-bold text-[#004275] dark:text-blue-400">Full Rankings</h2>
                <span class="text-[10px] sm:text-xs text-gray-400 dark:text-zinc-500 font-medium" id="last-update">Updating live...</span>
            </div>
            
            <div class="overflow-x-auto w-full">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] sm:text-xs uppercase tracking-wider text-gray-400 dark:text-zinc-500 border-b border-gray-100 dark:border-zinc-800 bg-gray-50/50 dark:bg-zinc-900/50">
                            <th class="px-4 md:px-8 py-3 font-semibold w-16 text-center">Rank</th>
                            <th class="px-4 md:px-8 py-3 font-semibold">Trader</th>
                            <th class="px-4 md:px-8 py-3 text-right font-semibold w-36">Performance</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-list" class="divide-y divide-gray-100 dark:divide-zinc-800"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION AREA =================
        const API_HOST = '127.0.0.1'; 
        const API_PORT = '5000';
        const API_URL  = `http://${API_HOST}:${API_PORT}/api/leaderboard`;
        const REFRESH_INTERVAL = 3000;
        // ======================================================

        let localDataCached = [];
        let previousTopThreeUsernames = []; 

        function roundToNearestFiveCents(value) {
            return Math.round(value * 20) / 20;
        }

        function initNotifications() {
            if (!("Notification" in window)) {
                document.getElementById('notif-status').innerText = "❌ Notifications unsupported";
                return;
            }

            if (Notification.permission === "granted") {
                updateNotifBadge("active");
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") updateNotifBadge("active");
                    else updateNotifBadge("denied");
                });
            } else {
                updateNotifBadge("denied");
            }
        }

        function updateNotifBadge(status) {
            const badge = document.getElementById('notif-status');
            if (status === "active") {
                badge.innerText = "Podiums Shift Alerts Active";
                badge.className = "text-xs font-semibold px-2 py-1 rounded bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400";
            } else {
                badge.innerText = "🔇 Alerts Blocked by Browser";
                badge.className = "text-xs font-semibold px-2 py-1 rounded bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400";
            }
        }

        async function updateLeaderboard() {
            try {
                const response = await fetch(`${API_URL}?t=${Date.now()}`, { 
                    method: 'GET',
                    mode: 'cors' 
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                let data = await response.json();
                
                if (Array.isArray(data)) {
                    data.sort((a, b) => b.total_pl - a.total_pl);
                    
                    data = data.map((item, index) => ({
                        ...item,
                        rank: index + 1
                    }));

                    checkPodiumChanges(data.slice(0, 3));
                    localDataCached = data;
                    renderUI();
                }
            } catch (error) {
                console.error("Leaderboard Sync Failed:", error);
                if (localDataCached.length === 0) {
                    document.getElementById('leaderboard-list').innerHTML = `<tr><td colspan="3" class="text-center py-8 text-red-500 font-bold text-sm">Error loading data. Verify host server settings.</td></tr>`;
                }
            }
        }

        function checkPodiumChanges(currentTopThree) {
            const currentNames = currentTopThree.map(player => player ? player.username : '');

            if (previousTopThreeUsernames.length === 0) {
                previousTopThreeUsernames = currentNames;
                return;
            }

            let dynamicShiftOccurred = false;
            for (let i = 0; i < 3; i++) {
                if (currentNames[i] !== previousTopThreeUsernames[i]) {
                    dynamicShiftOccurred = true;
                    break;
                }
            }

            if (dynamicShiftOccurred) {
                triggerSystemNotification(currentNames);
                previousTopThreeUsernames = currentNames; 
            }
        }

        function triggerSystemNotification(names) {
            if (Notification.permission === "granted") {
                const title = "Podium Shift Alert!";
                const options = {
                    body: `The Top 3 roster has changed!\n1st: ${names[0] || 'None'} | 2nd: ${names[1] || 'None'} | 3rd: ${names[2] || 'None'}`,
                    requireInteraction: false
                };
                new Notification(title, options);
            }
        }

        function renderUI() {
            if (!localDataCached.length) {
                document.getElementById('leaderboard-list').innerHTML = `<tr><td colspan="3" class="text-center py-8 text-gray-400 dark:text-zinc-500 font-semibold text-xs">No active trader sessions found.</td></tr>`;
                return;
            }
            renderPodium(localDataCached.slice(0, 3));
            renderList(localDataCached);
            updateTimestamp();
        }

        function renderPodium(topThree) {
            const container = document.getElementById('podium-area');
            if (!container || !topThree.length) return;
            
            const colors = ['gold', 'silver', 'bronze'];
            const borderColors = { 
                gold: 'border-yellow-400 dark:border-yellow-400', 
                silver: 'border-slate-300 dark:border-slate-400', 
                bronze: 'border-amber-600 dark:border-amber-600' 
            };

            const podiumElevations = {
                1: 'md:-translate-y-8 md:scale-105 z-10 shadow-md', 
                2: 'md:translate-y-0',                             
                3: 'md:translate-y-8'                              
            };

            let targetOrder = [...topThree];
            if (window.innerWidth >= 768 && topThree.length === 3) {
                targetOrder = [topThree[1], topThree[0], topThree[2]]; 
            }

            container.innerHTML = targetOrder.map((user) => {
                if (!user) return '';
                
                const rawPnL = parseFloat(user.total_pl) || 0;
                const pnlValue = roundToNearestFiveCents(rawPnL);
                
                const isProfit = pnlValue > 0;
                const isLoss = pnlValue < 0;
                
                const sign = isProfit ? '+' : (isLoss ? '-' : '');
                const textColors = isLoss ? 'text-[#991b1b] dark:text-[#f87171]' : (isProfit ? 'text-[#065f46] dark:text-[#34d399]' : 'text-gray-600 dark:text-zinc-400');
                
                const rankIndex = user.rank - 1;
                const colorClass = colors[rankIndex] || 'standard-rank';
                const borderClass = borderColors[colorClass] || 'border-slate-200 dark:border-zinc-700';
                const elevationClass = podiumElevations[user.rank] || '';

                return `
                    <div class="podium-card glass-card p-5 rounded-2xl border-t-4 ${borderClass} ${elevationClass} flex md:block items-center justify-between md:justify-center gap-4 transition-all duration-300">
                        <div class="flex md:block items-center gap-3">
                            <div class="rank-badge ${colorClass} md:mx-auto text-xs sm:text-sm shrink-0">${user.rank}</div>
                            <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm sm:text-base md:text-lg truncate max-w-[120px] sm:max-w-none text-left md:text-center mt-2">${user.username}</h3>
                        </div>
                        <div class="text-right md:text-center md:mt-3">
                            <p class="text-base sm:text-xl md:text-2xl font-extrabold ${textColors}">
                                ${sign}₹${Math.abs(pnlValue).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                            </p>
                            <p class="text-[9px] sm:text-[10px] md:text-xs text-gray-400 dark:text-zinc-400 uppercase tracking-wider font-semibold">Total P/L</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderList(users) {
            const list = document.getElementById('leaderboard-list');
            if (!list) return;
            
            list.innerHTML = users.map(user => {
                const rawPnL = parseFloat(user.total_pl) || 0;
                const pnlValue = roundToNearestFiveCents(rawPnL);

                const isProfit = pnlValue > 0;
                const isLoss = pnlValue < 0;
                
                const chipClass = isProfit ? 'profit-chip' : (isLoss ? 'loss-chip' : 'bg-gray-100 text-gray-600 dark:bg-zinc-700 dark:text-zinc-400');
                const sign = isProfit ? '+' : (isLoss ? '-' : '');
                const rankClass = user.rank === 1 ? 'gold' : user.rank === 2 ? 'silver' : user.rank === 3 ? 'bronze' : 'standard-rank';

                return `
                    <tr class="hover:bg-gray-50/50 dark:hover:bg-zinc-800/50 transition-colors border-b border-gray-100 dark:border-zinc-800 text-xs sm:text-sm">
                        <td class="px-4 md:px-8 py-3 flex justify-center"><div class="rank-badge ${rankClass} text-xs">${user.rank}</div></td>
                        <td class="px-4 md:px-8 py-3"><span class="font-bold text-gray-800 dark:text-gray-200">${user.username}</span></td>
                        <td class="px-4 md:px-8 py-3 text-right">
                            <span class="price-chip ${chipClass} text-xs">
                                ${sign} ₹${Math.abs(pnlValue).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                            </span>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(renderUI, 100); 
        });

        function updateTimestamp() {
            const el = document.getElementById('last-update');
            if (el) el.innerText = `Last update: ${new Date().toLocaleTimeString()}`;
        }

        document.getElementById('theme-toggle').addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        });

        window.addEventListener('DOMContentLoaded', () => {
            initNotifications();
            updateLeaderboard();
            setInterval(updateLeaderboard, REFRESH_INTERVAL);
        });
    </script>
</body>
</html>
